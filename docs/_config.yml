title: crossover-edtech-toolkit
description: Open-source platform for replicable crossover experimental studies evaluating generative AI in education
baseurl: "/crossover-edtech-toolkit"
url: "https://jtorreci.github.io"

remote_theme: just-the-docs/just-the-docs@v0.10.1

color_scheme: light

logo: "/assets/figures/logo.svg"

aux_links:
  "GitHub Repository":
    - "https://github.com/jtorreci/crossover-edtech-toolkit"

aux_links_new_tab: true

nav_sort: case_insensitive

heading_anchors: true

search_enabled: true
search:
  heading_level: 3

back_to_top: true
back_to_top_text: "Back to top"

footer_content: >-
  <a href="https://creativecommons.org/licenses/by/4.0/">MIT License</a> &copy; 2026
  Universidad de Extremadura &mdash; Teaching Innovation Project

plugins:
  - jekyll-seo-tag

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: red
  tip:
    title: Tip
    color: green
  important:
    title: Important
    color: yellow
